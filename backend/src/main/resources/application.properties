quarkus.http.port=8080
quarkus.http.cors=true
quarkus.http.cors.origins=https://app.motoria.ai,https://admin.motoria.ai,https://backoffice.motoria.ai
quarkus.http.cors.methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
quarkus.http.cors.headers=Authorization,Content-Type,Accept
quarkus.http.cors.access-control-allow-credentials=true
quarkus.http.cors.access-control-max-age=3600
quarkus.http.limits.max-body-size=20M
quarkus.http.auth.proactive=false

quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${MOTORIA_DB_USER}
quarkus.datasource.password=${MOTORIA_DB_PASSWORD}
quarkus.datasource.jdbc.url=${MOTORIA_DB_URL}

quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=false

quarkus.oidc.auth-server-url=${MOTORIA_OIDC_URL}
quarkus.oidc.client-id=motoria-backend
quarkus.oidc.credentials.secret=${MOTORIA_OIDC_SECRET}
quarkus.oidc.application-type=service

mp.messaging.outgoing.motoria-events-out.connector=smallrye-rabbitmq
mp.messaging.outgoing.motoria-events-out.exchange.name=motoria.events
mp.messaging.outgoing.motoria-events-out.host=${RABBITMQ_HOST}
mp.messaging.outgoing.motoria-events-out.port=5672
mp.messaging.outgoing.motoria-events-out.username=${RABBITMQ_USER}
mp.messaging.outgoing.motoria-events-out.password=${RABBITMQ_PASSWORD}

# Dead-letter handling is configured through queue arguments only.
# The application sets x-dead-letter-exchange and x-dead-letter-routing-key on the main queues.
# The broker topology must be pre-provisioned; SmallRye does not auto-create the DLX or DLQ queues.
mp.messaging.incoming.listing-certification-requested-in.connector=smallrye-rabbitmq
mp.messaging.incoming.listing-certification-requested-in.exchange.name=motoria.events
mp.messaging.incoming.listing-certification-requested-in.queue.name=certification.listing-certification-requested
mp.messaging.incoming.listing-certification-requested-in.routing-keys=listing.certification.requested
mp.messaging.incoming.listing-certification-requested-in.host=${RABBITMQ_HOST}
mp.messaging.incoming.listing-certification-requested-in.port=5672
mp.messaging.incoming.listing-certification-requested-in.username=${RABBITMQ_USER}
mp.messaging.incoming.listing-certification-requested-in.password=${RABBITMQ_PASSWORD}
mp.messaging.incoming.listing-certification-requested-in.failure-strategy=reject
mp.messaging.incoming.listing-certification-requested-in.queue.x-dead-letter-exchange=motoria.events.dlx
mp.messaging.incoming.listing-certification-requested-in.queue.x-dead-letter-routing-key=listing.certification.requested.dlq
mp.messaging.incoming.listing-notification-events-in.connector=smallrye-rabbitmq
mp.messaging.incoming.listing-notification-events-in.exchange.name=motoria.events
mp.messaging.incoming.listing-notification-events-in.queue.name=notification.listing-events
mp.messaging.incoming.listing-notification-events-in.routing-keys=listing.created,listing.published,listing.sold,listing.certification.requested
mp.messaging.incoming.listing-notification-events-in.host=${RABBITMQ_HOST}
mp.messaging.incoming.listing-notification-events-in.port=5672
mp.messaging.incoming.listing-notification-events-in.username=${RABBITMQ_USER}
mp.messaging.incoming.listing-notification-events-in.password=${RABBITMQ_PASSWORD}
mp.messaging.incoming.listing-notification-events-in.failure-strategy=reject
mp.messaging.incoming.listing-notification-events-in.queue.x-dead-letter-exchange=motoria.events.dlx
mp.messaging.incoming.listing-notification-events-in.queue.x-dead-letter-routing-key=listing.notification.dlq

%dev.quarkus.swagger-ui.always-include=true
%test.quarkus.swagger-ui.always-include=true
%prod.quarkus.swagger-ui.enable=false
quarkus.smallrye-openapi.info-title=Motoria.ai Backend API
quarkus.smallrye-openapi.info-version=1.0.0
motoria.rate-limit.requests-per-minute=100
